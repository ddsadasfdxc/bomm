<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .pw-app { max-width: 640px; margin: 0 auto; }

        .pw-output {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
        }

        .pw-text {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: 600;
            word-break: break-all;
            line-height: 1.5;
            min-height: 36px;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .pw-text .char-upper { color: var(--accent); }
        .pw-text .char-lower { color: var(--text-primary); }
        .pw-text .char-digit { color: #f59e0b; }
        .pw-text .char-symbol { color: #ec4899; }

        .pw-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .pw-btn {
            flex: 1;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .pw-btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .pw-btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .pw-btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .pw-btn-secondary:hover { border-color: var(--accent); }

        .pw-copied {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .pw-copied.show { opacity: 1; }

        .pw-strength {
            margin-bottom: 24px;
        }

        .pw-strength-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .pw-strength-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .pw-strength-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .pw-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .pw-section h3 {
            font-size: 15px;
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .pw-length-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .pw-length-row input[type="range"] {
            flex: 1;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        .pw-length-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .pw-length-num {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            min-width: 36px;
            text-align: center;
        }

        .pw-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .pw-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            user-select: none;
        }

        .pw-option:hover { border-color: var(--border); }
        .pw-option.active { border-color: var(--accent); background: var(--accent-light); }

        .pw-option-check {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .pw-option.active .pw-option-check {
            background: var(--accent);
            border-color: var(--accent);
        }

        .pw-option-check::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .pw-option.active .pw-option-check::after { opacity: 1; }

        .pw-option-label {
            font-size: 13px;
            font-weight: 500;
        }

        .pw-option-sample {
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: monospace;
        }

        .pw-history {
            margin-top: 24px;
        }

        .pw-history h3 {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .pw-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 13px;
            animation: cardIn 0.3s ease;
        }

        .pw-history-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }

        .pw-history-copy {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
        }

        .pw-history-copy:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .pw-text { font-size: 18px; }
            .pw-options { grid-template-columns: 1fr; }
            .pw-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="../" class="logo">← Back</a>
            <div style="font-weight:600;color:var(--text-primary)">Password Generator</div>
            <div></div>
        </div>
    </nav>

    <main class="main pw-app">
        <div class="pw-output">
            <div class="pw-text" id="pwDisplay"></div>
            <div class="pw-copied" id="pwCopied">Copied!</div>
            <div class="pw-actions">
                <button class="pw-btn pw-btn-primary" id="generateBtn">Generate</button>
                <button class="pw-btn pw-btn-secondary" id="copyBtn">Copy</button>
            </div>
        </div>

        <div class="pw-strength">
            <div class="pw-strength-header">
                <span>Strength</span>
                <span id="strengthLabel">Strong</span>
            </div>
            <div class="pw-strength-bar">
                <div class="pw-strength-fill" id="strengthFill" style="width:80%;background:#10a37f"></div>
            </div>
        </div>

        <div class="pw-section">
            <h3>Password Length</h3>
            <div class="pw-length-row">
                <input type="range" id="lengthSlider" min="4" max="64" value="16">
                <span class="pw-length-num" id="lengthNum">16</span>
            </div>

            <h3>Character Types</h3>
            <div class="pw-options">
                <div class="pw-option active" data-type="upper">
                    <div class="pw-option-check"></div>
                    <div>
                        <div class="pw-option-label">Uppercase</div>
                        <div class="pw-option-sample">A-Z</div>
                    </div>
                </div>
                <div class="pw-option active" data-type="lower">
                    <div class="pw-option-check"></div>
                    <div>
                        <div class="pw-option-label">Lowercase</div>
                        <div class="pw-option-sample">a-z</div>
                    </div>
                </div>
                <div class="pw-option active" data-type="digits">
                    <div class="pw-option-check"></div>
                    <div>
                        <div class="pw-option-label">Numbers</div>
                        <div class="pw-option-sample">0-9</div>
                    </div>
                </div>
                <div class="pw-option active" data-type="symbols">
                    <div class="pw-option-check"></div>
                    <div>
                        <div class="pw-option-label">Symbols</div>
                        <div class="pw-option-sample">!@#$%^&*</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pw-history" id="pwHistory" style="display:none">
            <h3>History</h3>
            <div id="pwHistoryList"></div>
        </div>
    </main>

    <script>
        var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        var LOWER = 'abcdefghijklmnopqrstuvwxyz';
        var DIGITS = '0123456789';
        var SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

        var options = { upper: true, lower: true, digits: true, symbols: true };
        var history = [];

        function getCharset() {
            var c = '';
            if (options.upper) c += UPPER;
            if (options.lower) c += LOWER;
            if (options.digits) c += DIGITS;
            if (options.symbols) c += SYMBOLS;
            return c || LOWER;
        }

        function generate(len) {
            var charset = getCharset();
            var arr = new Uint32Array(len);
            crypto.getRandomValues(arr);
            var pw = '';
            for (var i = 0; i < len; i++) pw += charset[arr[i] % charset.length];
            return pw;
        }

        function colorize(pw) {
            return pw.split('').map(function(ch) {
                if (UPPER.indexOf(ch) >= 0) return '<span class="char-upper">' + ch + '</span>';
                if (DIGITS.indexOf(ch) >= 0) return '<span class="char-digit">' + ch + '</span>';
                if (SYMBOLS.indexOf(ch) >= 0) return '<span class="char-symbol">' + ch + '</span>';
                return '<span class="char-lower">' + ch + '</span>';
            }).join('');
        }

        function getStrength(pw) {
            var score = 0;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (pw.length >= 16) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[a-z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            var labels = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong', 'Excellent'];
            var colors = ['#ef4444', '#f59e0b', '#f59e0b', '#10a37f', '#10a37f', '#6366f1', '#6366f1'];
            var idx = Math.min(score, labels.length - 1);
            return { label: labels[idx], color: colors[idx], pct: Math.round((idx + 1) / labels.length * 100) };
        }

        function updateDisplay() {
            var len = parseInt(document.getElementById('lengthSlider').value);
            var pw = generate(len);
            document.getElementById('pwDisplay').innerHTML = colorize(pw);
            document.getElementById('pwDisplay').dataset.pw = pw;
            var s = getStrength(pw);
            document.getElementById('strengthLabel').textContent = s.label;
            document.getElementById('strengthLabel').style.color = s.color;
            var fill = document.getElementById('strengthFill');
            fill.style.width = s.pct + '%';
            fill.style.background = s.color;
        }

        function copyPW(text) {
            navigator.clipboard.writeText(text).then(function() {
                var tip = document.getElementById('pwCopied');
                tip.classList.add('show');
                setTimeout(function() { tip.classList.remove('show'); }, 1500);
            });
        }

        function addToHistory(pw) {
            history.unshift(pw);
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            var container = document.getElementById('pwHistoryList');
            var section = document.getElementById('pwHistory');
            if (history.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            container.innerHTML = history.map(function(pw, i) {
                return '<div class="pw-history-item"><span class="pw-history-text">' + pw.replace(/</g,'&lt;') + '</span><button class="pw-history-copy" data-idx="' + i + '">Copy</button></div>';
            }).join('');
        }

        document.getElementById('generateBtn').addEventListener('click', function() {
            updateDisplay();
            addToHistory(document.getElementById('pwDisplay').dataset.pw);
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            copyPW(document.getElementById('pwDisplay').dataset.pw);
        });

        document.getElementById('lengthSlider').addEventListener('input', function() {
            document.getElementById('lengthNum').textContent = this.value;
            updateDisplay();
        });

        document.querySelectorAll('.pw-option').forEach(function(opt) {
            opt.addEventListener('click', function() {
                var type = this.dataset.type;
                options[type] = !options[type];
                this.classList.toggle('active', options[type]);
                if (!options.upper && !options.lower && !options.digits && !options.symbols) {
                    options.lower = true;
                    document.querySelector('[data-type="lower"]').classList.add('active');
                }
                updateDisplay();
            });
        });

        document.getElementById('pwHistoryList').addEventListener('click', function(e) {
            if (e.target.classList.contains('pw-history-copy')) {
                copyPW(history[parseInt(e.target.dataset.idx)]);
            }
        });

        updateDisplay();
    </script>
</body>
</html>
