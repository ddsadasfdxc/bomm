<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<link rel="stylesheet" href="../style.css">
<style>
.g-app{max-width:480px;margin:0 auto}
.g-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.g-score{display:flex;gap:8px}
.g-score-box{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;text-align:center;min-width:72px}
.g-score-label{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px}
.g-score-num{font-size:20px;font-weight:700;color:var(--accent);transition:transform .15s ease}
.g-btn{padding:8px 16px;font-size:13px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-family:inherit;transition:all .2s}
.g-btn:hover{border-color:var(--accent)}
.g-board{position:relative;background:var(--bg-secondary);border-radius:16px;padding:8px;aspect-ratio:1;touch-action:none;user-select:none}
.g-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;height:100%}
.g-cell{background:var(--bg-primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:28px;transition:all .12s ease;aspect-ratio:1;position:relative}
.g-cell[data-v="2"]{background:#eee4da;color:#776e65}
.g-cell[data-v="4"]{background:#ede0c8;color:#776e65}
.g-cell[data-v="8"]{background:#f2b179;color:#f9f6f2}
.g-cell[data-v="16"]{background:#f59563;color:#f9f6f2}
.g-cell[data-v="32"]{background:#f67c5f;color:#f9f6f2}
.g-cell[data-v="64"]{background:#f65e3b;color:#f9f6f2}
.g-cell[data-v="128"]{background:#edcf72;color:#f9f6f2;font-size:24px}
.g-cell[data-v="256"]{background:#edcc61;color:#f9f6f2;font-size:24px}
.g-cell[data-v="512"]{background:#edc850;color:#f9f6f2;font-size:24px}
.g-cell[data-v="1024"]{background:#edc53f;color:#f9f6f2;font-size:20px}
.g-cell[data-v="2048"]{background:#edc22e;color:#f9f6f2;font-size:20px}
[data-theme="dark"] .g-cell[data-v="2"]{background:#3a3530;color:#d4c8b8}
[data-theme="dark"] .g-cell[data-v="4"]{background:#3d3828;color:#d4c8b8}
@keyframes g-cell-in{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.g-cell-new{animation:g-cell-in .2s ease-out}
@keyframes g-cell-merge-pop{0%{transform:scale(1);box-shadow:none}40%{transform:scale(1.2);box-shadow:0 0 16px rgba(255,215,0,.6)}100%{transform:scale(1);box-shadow:none}}
.g-cell-merge{animation:g-cell-merge-pop .25s ease-out;z-index:1}
@keyframes g-score-up{0%{transform:scale(1)}50%{transform:scale(1.35);color:#ffd700}100%{transform:scale(1)}}
.g-score-pop{animation:g-score-up .3s ease-out}
.g-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);border-radius:16px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:10;opacity:0;pointer-events:none;transform:scale(0.8)}
.g-overlay.show{opacity:1;pointer-events:auto;animation:g-overlay-in .35s ease-out}
@keyframes g-overlay-in{0%{opacity:0;transform:scale(0.6)}65%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
.g-overlay h2{color:#fff;font-size:32px}
.g-overlay p{color:rgba(255,255,255,.8);font-size:16px}
#newGame{animation:g-btn-pulse 2.5s ease-in-out infinite}
@keyframes g-btn-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.g-cell:not([data-v="0"]):hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.16)}
@keyframes g-win-glow{0%,100%{box-shadow:0 0 8px rgba(237,194,46,.5),inset 0 0 8px rgba(237,194,46,.15)}50%{box-shadow:0 0 28px rgba(237,194,46,.9),inset 0 0 16px rgba(237,194,46,.3)}}
.g-cell-win{animation:g-win-glow 1.5s ease-in-out infinite}
.g-tip{margin-top:16px;font-size:13px;color:var(--text-tertiary);text-align:center}
@media(max-width:480px){.g-app{padding:0 8px}.g-cell{font-size:22px;border-radius:8px}.g-cell[data-v="128"],.g-cell[data-v="256"],.g-cell[data-v="512"]{font-size:18px}.g-cell[data-v="1024"],.g-cell[data-v="2048"]{font-size:14px}}
</style>
</head>
<body>
<nav class="navbar"><div class="nav-inner"><a href="../" class="logo">&larr; Back</a><div style="font-weight:600;color:var(--text-primary)">2048</div><div></div></div></nav>
<main class="main g-app">
<div class="g-header">
<div class="g-score">
<div class="g-score-box"><div class="g-score-label">Score</div><div class="g-score-num" id="score">0</div></div>
<div class="g-score-box"><div class="g-score-label">Best</div><div class="g-score-num" id="best">0</div></div>
</div>
<button class="g-btn" id="newGame">New Game</button>
</div>
<div class="g-board" id="board">
<div class="g-grid" id="grid"></div>
<div class="g-overlay" id="overlay"><h2 id="overlayTitle">Game Over</h2><p id="overlayMsg"></p><button class="g-btn" id="retryBtn" style="background:var(--accent);color:#fff;border:none">Try Again</button></div>
</div>
<p class="g-tip">Swipe or use arrow keys to play</p>
</main>
<script>
var grid,score,best=parseInt(localStorage.getItem('g2048_best'))||0,lastTilePos=null;
document.getElementById('best').textContent=best;

function init(){grid=Array(4).fill(null).map(function(){return Array(4).fill(0)});score=0;document.getElementById('score').textContent=0;document.getElementById('score').classList.remove('g-score-pop');var o=document.getElementById('overlay');o.classList.remove('show');void o.offsetWidth;addTile();var p2=addTile();render({newTile:p2,merged:[]})}

function addTile(){var empty=[];for(var r=0;r<4;r++)for(var c=0;c<4;c++)if(grid[r][c]===0)empty.push([r,c]);if(empty.length===0)return null;var cell=empty[Math.floor(Math.random()*empty.length)];grid[cell[0]][cell[1]]=Math.random()<0.9?2:4;lastTilePos=[cell[0],cell[1]];return lastTilePos}

function render(opts){opts=opts||{};var nt=opts.newTile,mt=opts.merged||[];var el=document.getElementById('grid');el.innerHTML='';for(var r=0;r<4;r++)for(var c=0;c<4;c++){var d=document.createElement('div');var cl=['g-cell'];if(nt&&nt[0]===r&&nt[1]===c)cl.push('g-cell-new');for(var m=0;m<mt.length;m++){if(mt[m][0]===r&&mt[m][1]===c){cl.push('g-cell-merge');break}}if(grid[r][c]===2048)cl.push('g-cell-win');d.className=cl.join(' ');d.setAttribute('data-v',grid[r][c]);d.textContent=grid[r][c]||'';el.appendChild(d)}}

function slide(row){var a=row.filter(function(v){return v!==0});var merged=[];for(var i=0;i<a.length-1;i++){if(a[i]===a[i+1]){a[i]*=2;score+=a[i];merged.push(i);a.splice(i+1,1)}}while(a.length<4)a.push(0);return{row:a,merged:merged}}

function move(dir){var moved=false,prev=grid.map(function(r){return r.slice()});var mergedTiles=[],prevScore=score;if(dir==='left'){for(var r=0;r<4;r++){var res=slide(grid[r]);grid[r]=res.row;for(var i=0;i<res.merged.length;i++)mergedTiles.push([r,res.merged[i]])}}else if(dir==='right'){for(var r=0;r<4;r++){var res=slide(grid[r].reverse());grid[r]=res.row.reverse();for(var i=0;i<res.merged.length;i++)mergedTiles.push([r,3-res.merged[i]])}}else if(dir==='up'){for(var c=0;c<4;c++){var col=[grid[0][c],grid[1][c],grid[2][c],grid[3][c]];var res=slide(col);for(var r=0;r<4;r++)grid[r][c]=res.row[r];for(var i=0;i<res.merged.length;i++)mergedTiles.push([res.merged[i],c])}}else if(dir==='down'){for(var c=0;c<4;c++){var col=[grid[3][c],grid[2][c],grid[1][c],grid[0][c]];var res=slide(col);for(var r=0;r<4;r++)grid[3-r][c]=res.row[r];for(var i=0;i<res.merged.length;i++)mergedTiles.push([3-res.merged[i],c])}}for(var r=0;r<4;r++)for(var c=0;c<4;c++)if(grid[r][c]!==prev[r][c])moved=true;if(moved){var newPos=addTile();render({newTile:newPos,merged:mergedTiles});var se=document.getElementById('score');se.textContent=score;if(score!==prevScore){se.classList.remove('g-score-pop');void se.offsetWidth;se.classList.add('g-score-pop')}if(score>best){best=score;localStorage.setItem('g2048_best',best);document.getElementById('best').textContent=best}checkGame()}}

function checkGame(){for(var r=0;r<4;r++)for(var c=0;c<4;c++){if(grid[r][c]===2048){document.getElementById('overlayTitle').textContent='You Win!';document.getElementById('overlayMsg').textContent='Score: '+score;document.getElementById('overlay').classList.add('show');return}if(grid[r][c]===0)return}for(var r=0;r<4;r++)for(var c=0;c<4;c++){if(c<3&&grid[r][c]===grid[r][c+1])return;if(r<3&&grid[r][c]===grid[r+1][c])return}document.getElementById('overlayTitle').textContent='Game Over';document.getElementById('overlayMsg').textContent='Score: '+score;document.getElementById('overlay').classList.add('show')}

document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft'){e.preventDefault();move('left')}else if(e.key==='ArrowRight'){e.preventDefault();move('right')}else if(e.key==='ArrowUp'){e.preventDefault();move('up')}else if(e.key==='ArrowDown'){e.preventDefault();move('down')}});

var board=document.getElementById('board'),tx,ty;
board.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY});
board.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)){if(Math.abs(dx)>30)move(dx>0?'right':'left')}else{if(Math.abs(dy)>30)move(dy>0?'down':'up')}});

document.getElementById('newGame').addEventListener('click',init);
document.getElementById('retryBtn').addEventListener('click',init);
init();
</script>
<button class="theme-toggle" id="themeToggle">🌙</button>
<script src="../theme.js"></script>
</body>
</html>
