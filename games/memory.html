<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<link rel="stylesheet" href="../style.css">
<style>
.mm-app{max-width:560px;margin:0 auto}
.mm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.mm-stats{display:flex;gap:8px}
.mm-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;min-width:64px}
.mm-stat-label{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.5px}
.mm-stat-num{font-size:18px;font-weight:700;color:var(--accent)}
.mm-btn{padding:8px 16px;font-size:13px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-family:inherit;transition:all .2s}
.mm-btn:hover{border-color:var(--accent)}
.mm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.mm-card{aspect-ratio:1;perspective:600px;cursor:pointer}
.mm-card-inner{position:relative;width:100%;height:100%;transition:transform .5s ease;transform-style:preserve-3d}
.mm-card.flipped .mm-card-inner,.mm-card.matched .mm-card-inner{transform:rotateY(180deg)}
.mm-card-front,.mm-card-back{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}
.mm-card-front{background:var(--bg-card);border:1px solid var(--border);font-size:28px;color:var(--text-tertiary)}
.mm-card-back{background:var(--accent);color:#fff;transform:rotateY(180deg);font-size:32px}
.mm-card.matched .mm-card-back{background:#22c55e}
.mm-card.matched{pointer-events:none}
.mm-card.flipped{pointer-events:none}
.mm-diff{display:flex;gap:8px;margin-top:12px;justify-content:center}

@keyframes mm-spawn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.mm-card.mm-spawning{animation:mm-spawn .4s ease-out}

@keyframes mm-match-bounce{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.12);box-shadow:0 0 24px rgba(255,215,0,.5)}100%{transform:rotateY(180deg) scale(1);box-shadow:none}}
.mm-card.mm-match .mm-card-inner{animation:mm-match-bounce .5s ease}

@keyframes mm-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.mm-card.mm-shake{animation:mm-shake .4s ease}

@keyframes mm-win-pulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.06);filter:brightness(1.2)}}
.mm-win .mm-card{animation:mm-win-pulse .6s ease infinite}

@keyframes mm-stat-pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.mm-stat-pop{animation:mm-stat-pop .3s ease}

@keyframes mm-btn-pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}
.mm-btn-active{animation:mm-btn-pulse 2s ease infinite}

.mm-card:hover .mm-card-inner{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
</style>
</head>
<body>
<nav class="navbar"><div class="nav-inner"><a href="../" class="logo">&larr; Back</a><div style="font-weight:600;color:var(--text-primary)">Memory Match</div><div></div></div></nav>
<main class="main mm-app">
<div class="mm-header">
<div class="mm-stats">
<div class="mm-stat"><div class="mm-stat-label">Moves</div><div class="mm-stat-num" id="moves">0</div></div>
<div class="mm-stat"><div class="mm-stat-label">Pairs</div><div class="mm-stat-num" id="pairs">0/8</div></div>
<div class="mm-stat"><div class="mm-stat-label">Time</div><div class="mm-stat-num" id="timer">0:00</div></div>
</div>
<button class="mm-btn" id="newGame">New Game</button>
</div>
<div class="mm-grid" id="grid"></div>
<div class="mm-diff">
<button class="mm-btn mm-btn-active" data-size="4" style="background:var(--accent);color:#fff;border-color:var(--accent)">4x4</button>
<button class="mm-btn" data-size="6">6x6</button>
</div>
</main>
<script>
var emojis=['🎯','🎨','🚀','💎','🌸','🎪','🔥','⭐','🎵','🌈','🦊','🐱','🌊','🍕','🎪','🦋','🌙','🍀','🎭','🔮'];
var gridSize=4,totalPairs,flipped=[],matched=[],moves,pairsFound,timerInterval,startTime,locked=false;

function shuffle(a){var arr=a.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t}return arr}

function popStat(id){var el=document.getElementById(id);el.classList.add('mm-stat-pop');setTimeout(function(){el.classList.remove('mm-stat-pop')},300)}

function initGame(){if(timerInterval)clearInterval(timerInterval);totalPairs=(gridSize*gridSize)/2;var picks=shuffle(emojis).slice(0,totalPairs);var cards=shuffle(picks.concat(picks));moves=0;pairsFound=0;flipped=[];matched=[];locked=false;document.getElementById('moves').textContent=0;document.getElementById('pairs').textContent='0/'+totalPairs;document.getElementById('timer').textContent='0:00';
var grid=document.getElementById('grid');grid.style.gridTemplateColumns='repeat('+gridSize+',1fr)';grid.innerHTML='';grid.classList.remove('mm-win');
cards.forEach(function(emoji,i){var card=document.createElement('div');card.className='mm-card';card.dataset.index=i;card.dataset.emoji=emoji;card.innerHTML='<div class="mm-card-inner"><div class="mm-card-front">?</div><div class="mm-card-back">'+emoji+'</div></div>';card.addEventListener('click',function(){if(locked||flipped.length>=2||flipped.indexOf(i)>=0||matched.indexOf(i)>=0)return;card.classList.add('flipped');flipped.push(i);if(flipped.length===2){moves++;document.getElementById('moves').textContent=moves;popStat('moves');checkMatch()}});card.style.animationDelay=(i*0.04)+'s';card.classList.add('mm-spawning');grid.appendChild(card)});
startTime=Date.now();timerInterval=setInterval(function(){var s=Math.floor((Date.now()-startTime)/1000);var m=Math.floor(s/60);var sec=s%60;document.getElementById('timer').textContent=m+':'+(sec<10?'0':'')+sec},1000)}

function checkMatch(){locked=true;var i1=flipped[0],i2=flipped[1];var grid=document.getElementById('grid');var c1=grid.children[i1],c2=grid.children[i2];if(c1.dataset.emoji===c2.dataset.emoji){matched.push(i1,i2);c1.classList.add('matched');c2.classList.add('matched');c1.classList.add('mm-match');c2.classList.add('mm-match');setTimeout(function(){c1.classList.remove('mm-match');c2.classList.remove('mm-match')},500);pairsFound++;document.getElementById('pairs').textContent=pairsFound+'/'+totalPairs;popStat('pairs');flipped=[];locked=false;if(pairsFound===totalPairs){clearInterval(timerInterval);grid.classList.add('mm-win');Array.from(grid.children).forEach(function(c,idx){c.style.animationDelay=(idx*0.06)+'s'});setTimeout(function(){alert('You won in '+moves+' moves!')},500)}}else{c1.classList.add('mm-shake');c2.classList.add('mm-shake');setTimeout(function(){c1.classList.remove('mm-shake');c2.classList.remove('mm-shake');c1.classList.remove('flipped');c2.classList.remove('flipped');flipped=[];locked=false},800)}}

document.getElementById('newGame').addEventListener('click',initGame);
document.querySelectorAll('[data-size]').forEach(function(btn){btn.addEventListener('click',function(){gridSize=parseInt(this.dataset.size);document.querySelectorAll('[data-size]').forEach(function(b){b.style.background='';b.style.color='';b.style.borderColor='';b.classList.remove('mm-btn-active')});this.style.background='var(--accent)';this.style.color='#fff';this.style.borderColor='var(--accent)';this.classList.add('mm-btn-active');initGame()})});

initGame();
</script>
<button class="theme-toggle" id="themeToggle">🌙</button>
<script src="../theme.js"></script>
</body>
</html>
